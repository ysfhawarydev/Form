<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Youssef Elhawary">
    <meta name="robots" content="follow, index, imageindex, archive">
    <meta name="description" content="Students Form">
    <meta name="keywords" content="Student, Form">
    <title>Students Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="allForm">
        <header>
            <h1>Students Form</h1>
            <p>Please fill this informations</p>
        </header>
        <main>
            <form id="loginForm" action="./result.html">
                <div class="parent">
                <div class="child">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name">
                </div>
                <div class="child">
                <label for="id">ID:</label>
                <input type="text" id="id" placeholder="Enter your ID">
                </div>
                </div>
            </form>
        </main>
        <footer>
            <button type="submit" form="loginForm">Login</button>
        </footer>
    </div>
</body>
<script src="./script.js"></script>
</html>
